# Master Health Monitoring Workflow Template
name: health-monitoring

on:
  schedule:
    - cron: '0 8 * * *'  # 1x/day at 08:00 UTC (reduced from every 30 minutes)
  workflow_dispatch:

jobs:
  health-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
      - run: npm ci
      - name: Run health checks
        run: npm run health:check || true
      - name: Log results
        if: always()
        run: |
          echo "Health check completed at $(date)" >> health.log
          cat health.log
      - name: Alert on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '⚠️ Health check failed'
            })
